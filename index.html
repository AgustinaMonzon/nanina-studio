<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NANINA STUDIO | Turnos</title>
    <link rel="icon" type="image/png" href="loguito.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="booking-card">
      <div class="floral-top">
        <img src="header.png" alt="" class="floral-img" />
      </div>

      <div class="header-image-container">
        <img src="logo.png" alt="Logo NANINA STUDIO" class="main-photo" />
      </div>

      <header>
        <p class="subtitle">Peluquería</p>
        <div class="gold-divider"></div>
      </header>

      <section class="info-box">
        <p>
          <a
            href="https://maps.google.com/?q=Cafferata+1062,+Rosario"
            target="_blank"
            rel="noopener"
            class="location-link"
            >📍 Cafferata 1062, Rosario</a
          >
        </p>
        <p class="horario-texto">📅 Atención únicamente con turno previo</p>
        <p
          style="
            font-size: 0.8rem;
            color: var(--texto-secundario);
            margin-top: 5px;
          "
        >
          Martes a Sábado • 8:30 a 19:00 hs
        </p>
      </section>

      <section class="booking-form">
        <h3>Reservá tu Turno</h3>
        <div class="form-group">
          <label for="dia">Seleccioná el día:</label>
          <select id="dia"></select>
        </div>
        <div class="form-group">
          <label for="hora">Horario disponible:</label>
          <select id="hora"></select>
        </div>
        <button id="btnWhatsapp" onclick="enviarTurno()" disabled>
          <img
            src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
            width="20"
            alt="ws"
          />
          Agendar por WhatsApp
        </button>
      </section>

      <section class="reviews-section">
        <button id="toggle-review-form" onclick="toggleReviewForm()">
          + Dejanos tu opinión
        </button>

        <div class="reviews-form" id="form-opinion" style="display: none">
          <h3>Tu opinión nos importa</h3>
          <input
            type="text"
            id="rev-nombre"
            placeholder="Tu nombre"
            class="input-review"
          />
          <div class="stars-rating">
            <span class="star" data-value="5">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="1">★</span>
          </div>
          <textarea
            id="rev-comentario"
            placeholder="¿Cómo fue tu experiencia?"
          ></textarea>
          <button id="btnEnviarReseña" onclick="enviarReseña()">
            Publicar Comentario
          </button>
        </div>

        <div class="reviews-display">
          <h4>Lo que dicen nuestras clientas:</h4>
          <div id="contenedor-resenas">Cargando comentarios...</div>
        </div>
      </section>

      <div class="floral-bottom">
        <img src="footer.png" alt="" class="floral-img" />
      </div>
    </div>

    <footer class="site-footer">
      <p class="history-text">
        "Estilo, dedicación y un espacio pensado para vos"
      </p>
      <a
        href="https://www.instagram.com/na.nina_studio/"
        target="_blank"
        rel="noopener"
        class="nombre-firma"
        >@na.nina_studio</a
      >
    </footer>

    <script src="script.js"></script>
  </body>
</html>
